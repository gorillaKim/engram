name: release

# 태그 (v*) push 시 prebuilt binary 를 빌드해 GitHub Releases asset 으로 업로드.
# ADR-0011 참조.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # release asset 업로드용

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest        # macOS ARM runner
          - target: x86_64-apple-darwin
            os: macos-latest        # macOS ARM runner (cross-compile to Intel Mac)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Update Cargo.toml version to match tag
        shell: bash
        run: |
          python3 -c "
          import os, re
          ver = os.environ.get('GITHUB_REF_NAME', 'v0.1.0').lstrip('v')
          with open('Cargo.toml', 'r') as f:
              content = f.read()
          content = re.sub(r'^version\s*=\s*\"[^\"]+\"', f'version = \"{ver}\"', content, flags=re.MULTILINE)
          with open('Cargo.toml', 'w') as f:
              f.write(content)
          "

      - name: Build release binary
        run: cargo build --release -p engram-cli --target ${{ matrix.target }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          echo "ver=${ver}" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          src="target/${{ matrix.target }}/release/engram"
          dist="dist"
          mkdir -p "$dist"
          tar -C "$(dirname "$src")" -czf \
            "$dist/engram-${{ steps.version.outputs.ver }}-${{ matrix.target }}.tar.gz" \
            "$(basename "$src")"

      - name: Upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/engram-${{ steps.version.outputs.ver }}-${{ matrix.target }}.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true

  desktop:
    name: desktop (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: desktop-aarch64
            platform: darwin-aarch64
          - target: x86_64-apple-darwin
            artifact: desktop-x86_64
            platform: darwin-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install frontend dependencies
        working-directory: crates/engram-desktop/ui
        run: pnpm install

      - name: Install tauri-cli
        run: pnpm add -g @tauri-apps/cli@^2

      - name: Update configuration versions to match tag
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const refName = process.env.GITHUB_REF_NAME || 'v0.1.0';
            const ver = refName.startsWith('v') ? refName.slice(1) : refName;

            // Update tauri.conf.json
            const tauriPath = 'crates/engram-desktop/src-tauri/tauri.conf.json';
            if (fs.existsSync(tauriPath)) {
              const tauriConf = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
              tauriConf.version = ver;
              fs.writeFileSync(tauriPath, JSON.stringify(tauriConf, null, 2), 'utf8');
            }

            // Update Cargo.toml (root)
            const cargoPath = 'Cargo.toml';
            if (fs.existsSync(cargoPath)) {
              let cargo = fs.readFileSync(cargoPath, 'utf8');
              cargo = cargo.replace(/^version\s*=\s*\"[^\"]+\"/m, 'version = \"' + ver + '\"');
              fs.writeFileSync(cargoPath, cargo, 'utf8');
            }
          "

      - name: Build desktop app
        working-directory: crates/engram-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: tauri build --target ${{ matrix.target }}

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true

      - name: Collect update artifacts
        shell: bash
        run: |
          mkdir -p update-artifacts
          PLATFORM="${{ matrix.platform }}"
          for f in target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz; do
            fname=$(basename "$f")
            cp "$f" "update-artifacts/${fname%.app.tar.gz}-${PLATFORM}.app.tar.gz"
          done
          for f in target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig; do
            fname=$(basename "$f")
            cp "$f" "update-artifacts/${fname%.app.tar.gz.sig}-${PLATFORM}.app.tar.gz.sig"
          done

      - name: Upload update artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: update-artifacts/
          if-no-files-found: warn

  merge-latest-json:
    name: merge latest.json
    runs-on: ubuntu-latest
    needs: desktop
    steps:
      - name: Download aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-aarch64
          path: aarch64/

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-x86_64
          path: x86_64/

      - name: Resolve version
        id: version
        run: |
          ver="${GITHUB_REF_NAME#v}"
          echo "ver=${ver}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.ver }}"

          AARCH64_SIG=$(cat aarch64/*.app.tar.gz.sig)
          X64_SIG=$(cat x86_64/*.app.tar.gz.sig)
          AARCH64_BUNDLE=$(basename aarch64/*.app.tar.gz)
          X64_BUNDLE=$(basename x86_64/*.app.tar.gz)

          jq -n \
            --arg version "$VERSION" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg aarch64_sig "$AARCH64_SIG" \
            --arg x64_sig    "$X64_SIG" \
            --arg aarch64_url "https://github.com/gorillaKim/engram/releases/download/v${VERSION}/${AARCH64_BUNDLE}" \
            --arg x64_url     "https://github.com/gorillaKim/engram/releases/download/v${VERSION}/${X64_BUNDLE}" \
            '{
              version: $version,
              notes: "",
              pub_date: $date,
              platforms: {
                "darwin-aarch64": { signature: $aarch64_sig, url: $aarch64_url },
                "darwin-x86_64":  { signature: $x64_sig,    url: $x64_url }
              }
            }' > latest.json

      - name: Upload bundles, sigs, and latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aarch64/*.app.tar.gz
            aarch64/*.app.tar.gz.sig
            x86_64/*.app.tar.gz
            x86_64/*.app.tar.gz.sig
            latest.json
          fail_on_unmatched_files: true
