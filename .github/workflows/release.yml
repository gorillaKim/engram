name: release

# 태그 (v*) push 시 prebuilt binary 를 빌드해 GitHub Releases asset 으로 업로드.
# ADR-0011 참조.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # release asset 업로드용

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest        # macOS ARM runner
          - target: x86_64-apple-darwin
            os: macos-latest        # macOS ARM runner (cross-compile to Intel Mac)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p engram-cli --target ${{ matrix.target }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          echo "ver=${ver}" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          src="target/${{ matrix.target }}/release/engram"
          dist="dist"
          mkdir -p "$dist"
          tar -C "$(dirname "$src")" -czf \
            "$dist/engram-${{ steps.version.outputs.ver }}-${{ matrix.target }}.tar.gz" \
            "$(basename "$src")"

      - name: Upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/engram-${{ steps.version.outputs.ver }}-${{ matrix.target }}.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true

  desktop:
    name: desktop (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install frontend dependencies
        working-directory: crates/engram-desktop/ui
        run: pnpm install

      - name: Install tauri-cli
        run: pnpm add -g @tauri-apps/cli@^2

      - name: Build desktop app
        working-directory: crates/engram-desktop
        run: tauri build --target ${{ matrix.target }}

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
